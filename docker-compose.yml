# syntax=docker/dockerfile:1.6
# DecisionCourt docker-compose v0.8.3 (P0-3 容器硬化)
#
# 关键安全变更:
#   1. 所有 image 锁具体版本(去掉 :latest)
#   2. postgres / redis 端口从 host 网络移除(只走 backend 内部访问)
#   3. backend / frontend 加 user: "1001:1001" 切非 root
#   4. cap_drop: [ALL] + no-new-privileges 限制容器能力
#   5. 关键卷 read_only: true + tmpfs 写临时目录
#   6. JWT_SECRET 必填(:?报错),不再有默认值
#
# v0.8.3 决定:统一用 Bocha API 做 search,SearXNG 服务已移除。
#
# 注意:
#   - 本 compose 文件只用于生产/部署。开发请用 docker-compose.dev.yml
#   - .env 必须在宿主机存在(里面含真实 LLM_KEY / JWT_SECRET / DB_PASSWORD / BOCHA_API_KEY)
#   - POSTGRES_PASSWORD 必须足够长(建议 32 字符)
version: "3.8"

services:
  postgres:
    # P0-3：锁版本(去 :latest)。postgres 15.x 是稳定 LTS。
    image: postgres:15.13-alpine
    container_name: dc_postgres
    # v0.8.3 安全：去掉 host 端口映射(只允许内部网络访问)
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-decisioncourt}
      # P0-3：DB 密码从 env 读(无默认值)。docker-compose fail-fast。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-decisioncourt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # v0.8.3 安全：postgres 进程在容器内以非 root 运行
    user: "70:70"  # postgres user
    # v0.8.3 安全：read_only: true + tmpfs 给临时目录
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    # v0.8.3 安全：最小权限
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-decisioncourt} -d ${POSTGRES_DB:-decisioncourt}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4.1-alpine
    container_name: dc_redis
    # v0.8.3 安全：去掉 host 端口
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    user: "999:999"  # redis user
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dc_backend
    user: "1001:1001"  # 与 Dockerfile adduser uid:gid 对齐
    environment:
      PORT: 8080
      # P0-3：DATABASE_URL 从 env 读,无默认值。
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL_V3: ${LLM_MODEL_V3:-deepseek-chat}
      LLM_MODEL_R1: ${LLM_MODEL_R1:-deepseek-reasoner}
      # v0.9 (ADR 0013): LLM Gateway 三件套(默认关闭,线上开)
      AGENT_GATEWAY_LLM_TIMEOUT_SEC: ${AGENT_GATEWAY_LLM_TIMEOUT_SEC:-90}
      AGENT_GATEWAY_CACHE_ENABLED: ${AGENT_GATEWAY_CACHE_ENABLED:-false}
      AGENT_GATEWAY_CACHE_TTL_SEC: ${AGENT_GATEWAY_CACHE_TTL_SEC:-300}
      AGENT_GATEWAY_CACHE_MAX_ENTRIES: ${AGENT_GATEWAY_CACHE_MAX_ENTRIES:-10000}
      AGENT_GATEWAY_BREAKER_ENABLED: ${AGENT_GATEWAY_BREAKER_ENABLED:-false}
      AGENT_GATEWAY_BREAKER_FAILURE_RATIO: ${AGENT_GATEWAY_BREAKER_FAILURE_RATIO:-0.5}
      AGENT_GATEWAY_BREAKER_MIN_REQUESTS: ${AGENT_GATEWAY_BREAKER_MIN_REQUESTS:-10}
      AGENT_GATEWAY_BREAKER_OPEN_TIMEOUT_SEC: ${AGENT_GATEWAY_BREAKER_OPEN_TIMEOUT_SEC:-30}
      # v0.9 (ADR 0014): 用户级 trial 限流(0 禁用)
      USER_TRIAL_LIMIT: ${USER_TRIAL_LIMIT:-5}
      # v0.8.3 决定：默认 Bocha(必填 BOCHA_API_KEY)
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-bocha}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BOCHA_API_KEY: ${BOCHA_API_KEY:?BOCHA_API_KEY must be set in .env (or override SEARCH_PROVIDER)}
      # P0-2：JWT_SECRET 必填,无默认值。docker-compose :? 报 fail。
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-168}
      # P1-1：AllowedOrigins 生产必须覆盖为 https://yourdomain.com
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # 生产 COOKIE_SECURE 必须 true(HTTPS-only)
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
    # v0.8.3 安全：去掉 host 端口(只通过 nginx/ALB 反代访问)
    expose:
      - "8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # v0.9 修复:NEXT_PUBLIC_* 是 build-time 变量,必须通过 build args 注入到
      # frontend Dockerfile 的 builder stage,否则编译时 inline 成空字符串。
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://backend:8080}
        NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
    container_name: dc_frontend
    user: "1001:1001"
    environment:
      # 容器间访问 backend(同 docker 网络)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://backend:8080}
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
