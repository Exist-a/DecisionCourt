version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dc_postgres
    environment:
      POSTGRES_USER: decisioncourt
      POSTGRES_PASSWORD: decisioncourt
      POSTGRES_DB: decisioncourt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisioncourt -d decisioncourt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: dc_searxng
    ports:
      - "8081:8080"
    environment:
      - BASE_URL=http://localhost:8081
      - INSTANCE_NAME=DecisionCourtSearx
    volumes:
      - searxng_data:/etc/searxng
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dc_backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://decisioncourt:decisioncourt@postgres:5432/decisioncourt?sslmode=disable
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL_V3: ${LLM_MODEL_V3:-deepseek-chat}
      LLM_MODEL_R1: ${LLM_MODEL_R1:-deepseek-reasoner}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-searxng}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-decisioncourt-secret}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dc_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  searxng_data:
