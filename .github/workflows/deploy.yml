name: Deploy

# CD workflow: build 镜像 → push ACR → SSH 到 ECS → docker compose pull + up
#
# 触发条件 (v0.10.10 升级, 实现"push → 测试 → 部署"CI/CD 流水线):
#   1. git tag v*.*.* push     → 立即跑 (保留, 生产发版用)
#   2. workflow_dispatch       → 手动跑 (保留)
#   3. Test workflow 跑完      → 只在 success 时跑 (v0.10.10 新增)
#      (push main → Test 跑 → 全绿 → Deploy 跑)
#
# if gate 逻辑:
#   - push tag            → 跑
#   - workflow_dispatch   → 跑
#   - workflow_run        → 只在 conclusion == 'success' 时跑
#      (失败的 Test 不会触发 Deploy, 满足"测试通过才部署")
#
# 镜像 tag:
#   - push tag            → 用 git tag 名 (e.g. v0.10.1, 精确可追溯)
#   - 其他情况             → 用 commit SHA 短 7 位 (e.g. 5604a24)
#   - 不用 :latest(避免"哪个版本在跑"不清楚)
#
# 必备 GitHub Secrets (Settings → Secrets and variables → Actions):
#   ACR_REGISTRY, ACR_USERNAME, ACR_PASSWORD, ECS_HOST, ECS_USER, ECS_SSH_KEY,
#   NEXT_PUBLIC_API_URL, NEXT_PUBLIC_WS_URL

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

# workflow_run 触发的 workflow 默认拿不到 secrets, 需要 permissions + secrets: inherit
# (GitHub 2023 起的默认行为, 但显式声明更稳)
permissions:
  contents: read
  actions: read

# TAG: push tag 时用 tag 名, 其他情况用 commit SHA
# (workflow_run 时 github.ref 是触发 workflow 的 ref = refs/heads/main, 不是 refs/tags/*)
env:
  TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}

jobs:
  # ============== Build + Push ACR ==============
  build:
    name: Build & Push
    # 3 选 1 gate: push tag / workflow_dispatch 必跑, workflow_run 只在 success 跑
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/decision-court/decision-court-backend:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/decision-court/decision-court-frontend:${{ env.TAG }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_USE_MOCK=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============== Deploy to ECS ==============
  deploy:
    name: Deploy to ECS
    needs: build
    # 跟 build job 同样的 gate, 失败时 deploy 跳过
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            # v0.10.12: ECS 实际路径是 /opt/DecisionCourt (大写 D, 跟 scripts/ecs.ps1 一致)
            # 之前写 /opt/decisioncourt (小写 d) 跟 ecs.ps1 不一致,导致 cd fail 整个 deploy 1 秒挂
            cd /opt/DecisionCourt

            # 拉新镜像
            echo "==> 拉新镜像 (tag: ${{ env.TAG }})"
            REGISTRY="${{ secrets.ACR_REGISTRY }}"
            docker pull "$REGISTRY/decision-court/decision-court-backend:${{ env.TAG }}"
            docker pull "$REGISTRY/decision-court/decision-court-frontend:${{ env.TAG }}"

            # 重打 tag 到 latest(ECS compose 用 :latest)
            docker tag "$REGISTRY/decision-court/decision-court-backend:${{ env.TAG }}" \
                       "$REGISTRY/decision-court/decision-court-backend:latest"
            docker tag "$REGISTRY/decision-court/decision-court-frontend:${{ env.TAG }}" \
                       "$REGISTRY/decision-court/decision-court-frontend:latest"

            # 重启容器
            # v0.10.15: --force-recreate backend frontend 保证新 :latest 强制重建
            # (普通 up -d 在某些 compose 版本下会复用旧容器, image tag 变了但没检测到)
            echo "==> 重启容器 (force-recreate backend/frontend)"
            docker compose up -d --force-recreate backend frontend

            # 显示状态
            echo "==> 部署结果"
            docker compose ps

            # 看 backend 健康
            # v0.10.15: 容器内 wget,不用 host 上 curl
            # 真因: docker-compose.yml L125-126 用 expose 不是 ports (P0-3 安全加固)
            #       host 上 localhost:8080 连不上 backend
            # 修法: 用 docker compose exec 在 backend 容器内 wget
            #       (alpine busybox 自带 wget, Dockerfile 已确认)
            echo "==> Backend health check (容器内 wget)"
            sleep 8
            docker compose exec -T backend wget -qO- http://127.0.0.1:8080/health || (echo "health 失败" && docker compose logs --tail=30 backend && exit 1)

            echo ""
            echo "============================================================"
            echo "  v${{ env.TAG }} 部署完成!"
            echo "============================================================"
