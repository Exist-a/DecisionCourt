name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# 2025-09-19 GitHub 弃用 Node 20,2026-06-16 Runner 默认 Node 24。
# 用 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true 强制所有 action 跑 Node 24。
# 同步把 action 升到 v6 (node24) — v5 仍为 node20,治标不治本。
# 来源: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# Action 版本对照 (node runtime):
#   actions/checkout    v5=node20 → v6=node24
#   actions/setup-go    v5=node20 → v6=node24 (v6 支持 go-version-file: 'go.mod' 自动读 go 1.26)
#   actions/setup-node  v4=node20 → v5=node24
#   pnpm/action-setup   v4=node24 (无需升)
#   actions/setup-python v5=node24 (无需升)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============== Backend ==============
  backend-test:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # go.mod 写的是 go 1.26.1,setup-go v6 支持 go-version-file 自动读 toolchain
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Resolve modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        # v0.10.4: 跳过 v0.9.4 HA-001 spec 占位测试
        # finding_evidence_confusion_test.go 含 4 个 case 标记"该修复还没做"。
        # 修复 spec 是 v0.9.4 独立工作，spec 修复前 CI 用 -skip 避免 fail。
        run: |
          go test -count=1 -race \
            -skip 'TestBaseRules_ForbidsSourcingFindingAsEvidence|TestBaseRules_ExplicitRefusalPattern|TestBuildContext_NotInflatedWithFindings|TestProsecutorPrompt_ShouldHaveFindingSection_WhenFindingsExist' \
            ./...

  # ============== Frontend ==============
  frontend-test:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run tsc

      - name: Unit tests
        run: pnpm exec node --experimental-strip-types --test \
          lib/transport.test.ts \
          lib/reconnect.test.ts \
          lib/analytics/analytics.test.ts \
          lib/analytics/runtime.test.ts

      - name: Build
        run: pnpm run build

  # ============== Doc cross-links ==============
  doc-cross-links:
    name: Doc cross-links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify ADR index count
        # 校验 docs/adr/README.md 索引的 ADR 数量 == 真实 .md 文件数量
        run: |
          expected=$(ls docs/adr/*.md | wc -l)
          actual=$(grep -c '^### \[\|^| [0-9]' docs/adr/README.md)
          echo "Expected ADR count (real files): $expected"
          echo "Indexed ADR count (README refs): $actual"
          # 注: README 索引可能每个 ADR 一行,简单数量匹配
          if [ "$expected" -gt 22 ]; then
            echo "ADR count looks healthy: $expected files"
          else
            echo "WARN: ADR count unusually low ($expected), verify README index"
            exit 1
          fi
